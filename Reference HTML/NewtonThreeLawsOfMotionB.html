<!DOCTYPE html>
<html>
	<head>
		<script type="module" src="https://q5js.org/q5.js"></script>
		<script type="module" src="https://q5play.org/q5play.js"></script>
		<style>
			h1 {
				font-size: 80px; 
				text-align: center;
			}
		</style>
	</head>
		
	<body>
		<h1>Newton's Second Law of Motion Simulation (Acceleration)</h1>
		<h2 style="text-align: center;">This is a simulation showing how mass and acceleration affect the net force of an object.</h2>
		<input type="range" min="1" max="100" value="25" id="object1MassSlider"></input><text>Object 1 Mass</text><br>
		<input type="range" min="0" max="100" value="5" id="object1AccelerationSlider"></input><text>Object 1 Acceleration</text><br>
	</body>
	<script>
	
		let object1;
		setInterval(generate, 1500);	
		
		function generate(){
			object1 = new Sprite();
			object1.y = 475;
			object1.x = 0;
			object1.mass = parseFloat(object1MassSlider.value);
			object1.bounciness = 0.3;
			object1.vel.x = parseFloat(object1AccelerationSlider.value);
			object1.friction = 0;
			toggle = true;
			object1.life = 500;
		}
		
		
		async function setup() {
			await Canvas(2000, 600);
			world.gravity.y = 10;
			frameRate(100);
			
			ground = new Sprite();
			ground.physics = STATIC;
			ground.width = width * 1.5;
			ground.height = 4;
			ground.color = "grey";
			ground.y = 500;
		}

		
	
		
		function draw(){
			background("#eeeeee");
			fill(0);
			textSize(25);
			text(`Object 1 Mass: ${object1MassSlider.value}kg`, 50, 50);
			text(`Object 1 Accleration: ${object1AccelerationSlider.value}m/s`, 325, 50);
			text(`Total Force: ${object1MassSlider.value * object1AccelerationSlider.value}N`, 650, 50);
		}
		
	</script>
</html>

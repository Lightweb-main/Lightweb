<!DOCTYPE html>
<html>
	<head>
		<script type="module" src="https://q5js.org/q5.js"></script>
		<script type="module" src="https://q5play.org/q5play.js"></script>
	</head>
		
	<body>
		<input type="range" id="object1AngularDisplacementSlider" min=1 max=3600 value=50><p id="object1AngularDisplacementDisplay" style="display: inline;">Object 1 Angular Displacement: </p>
		<input type="range" id="object1TimeDisplacementSlider" min=1 max=10 value=3><p id="object1TimeDisplacementSliderDisplay" style="display: inline;">Object 1 Time Displacement: </p>
		<button onClick="generate1()">Generate Object 1</button><br>
		<input type="range" id="object2AngularDisplacementSlider" min=1 max=3600 value=50><p id="object2AngularDisplacementDisplay" style="display: inline;">Object 2 Angular Displacement: </p>
		<input type="range" id="object2TimeDisplacementSlider" min=1 max=10 value=3><p id="object2TimeDisplacementDisplay" style="display: inline;">Object 2 Time Displacement: </p>
		<button onClick="generate2()">Generate Object 2</button><br>
		<button onClick="generate()">Generate Both Objects</button><br>
		
	</body>
	<script>
		let object1;
		let object2;
	
		function generate1(){
			object1 = new Sprite();
			object1.bounciness = 0;
			object1.friction = 0;
			object1.life = 500;
			object1.rotationSpeed = object1AngularDisplacementSlider.value / object1TimeDisplacementSlider.value;
			object1.x = 500;
		}
		
		function generate2(){
			object2 = new Sprite();
			object2.bounciness = 0;
			object2.friction = 0;
			object2.life = 500;
			object1.x = 1500;
			object1.rotationSpeed = object2AngularDisplacementSlider.value / object2TimeDisplacementSlider.value;
		}
		
		function generate(){
			object1 = new Sprite();
			object1.bounciness = 0;
			object1.friction = 0;
			object1.life = 500;
			object1.rotationSpeed = object1AngularDisplacementSlider.value / object1TimeDisplacementSlider.value;
			object1.x = 500;
			
			object2 = new Sprite();
			object2.bounciness = 0;
			object2.friction = 0;
			object2.life = 500;
			object2.x = 1500;
			object2.rotationSpeed = object2AngularDisplacementSlider.value / object2TimeDisplacementSlider.value;
		}
		
		
		async function setup() {
			await Canvas(2000, 600);
		}
		
		function draw(){
			background("#eeeeee");
			object1AngularDisplacementDisplay.textContent = `Object 1 Angular Displacement: ${object1AngularDisplacementSlider.value} degrees`;
			object1TimeDisplacementSliderDisplay.textContent = `Object 1 Time Displacement: ${object1TimeDisplacementSlider.value} seconds`;
			
			object2AngularDisplacementDisplay.textContent = `Object 2 Angular Displacement: ${object2AngularDisplacementSlider.value} degrees`;
			object2TimeDisplacementDisplay.textContent = `Object 2 Time Displacement: ${object2TimeDisplacementSlider.value} seconds`;
		}
		
		document.addEventListener('DOMContentLoaded', function(){
		let message = document.createElement('p');
		message.innerHTML = "Notice how much faster an object spins with a higher angle displacement or slower with a higher time displacement.";
		document.body.appendChild(message);
		});
	</script>
</html>

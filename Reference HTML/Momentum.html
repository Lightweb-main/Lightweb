<!DOCTYPE html>
<html>
	<head>
		<script type="module" src="https://q5js.org/q5.js"></script>
		<script type="module" src="https://q5play.org/q5play.js"></script>
	</head>
		
	<body>
		<input type="range" id="object1MassSlider" min=1 max=500 value=50><p id="object1MassDisplay" style="display: inline;">Object 1 Mass: </p>
		<input type="range" id="object1SpeedSlider" min=1 max=10 value=3><p id="object1SpeedDisplay" style="display: inline;">Object 1 Speed: </p>
		<button onClick="generate1()">Generate Object 1</button><br>
		<input type="range" id="object2MassSlider" min=1 max=500 value=50><p id="object2MassDisplay" style="display: inline;">Object 2 Mass: </p>
		<input type="range" id="object2SpeedSlider" min=1 max=10 value=3><p id="object2SpeedDisplay" style="display: inline;">Object 2 Speed: </p>
		<button onClick="generate2()">Generate Object 2</button><br>
		<button onClick="generate()">Generate Both Objects</button><br>
		
	</body>
	<script>
		
		function generate1(){
			let object = new Sprite();
			object.x = 300;
			object.y = 450;
			object.bounciness = 0;
			object.friction = 0;
			object.mass = Number(object1MassSlider.value);
			object.vel.x = Number(object1SpeedSlider.value);
		}
		
		function generate2(){
			let object = new Sprite();
			object.x = 1500;
			object.y = 450;
			object.bounciness = 0;
			object.friction = 0;
			object.mass = object2MassSlider.value;
			object.vel.x = object2SpeedSlider.value * -1;
		}
		
		function generate(){
			let object1 = new Sprite();
			object1.x = 300;
			object1.y = 450;
			object1.bounciness = 0;
			object1.friction = 0;
			object1.mass = object1MassSlider.value;
			object1.vel.x = object1SpeedSlider.value;
			
			let object2 = new Sprite();
			object2.x = 1500;
			object2.y = 450;
			object2.bounciness = 0;
			object2.friction = 0;
			object2.mass = object2MassSlider.value;
			object2.vel.x = object2SpeedSlider.value * -1;
		}
		async function setup(){
			await Canvas(2000, 600);
			
			let floor = new Sprite();
			floor.mass = 150250;
			floor.y = 500;
			floor.height = 15;
			floor.width = 2400;
			floor.bounciness = 0;
			floor.friction = 0;
			floor.fill = "#dddddd"
			floor.stroke = "#bbbbbb"
			floor.physics = STATIC;
			world.gravity.y = 10;
		}
		
		function draw(){
			background("#eeeeee");
			object1MassDisplay.textContent = `Object 1 Mass: ${object1MassSlider.value}`;
			object1SpeedDisplay.textContent = `Object 1 Speed: ${object1SpeedSlider.value}`;
			object2MassDisplay.textContent = `Object 2 Mass: ${object2MassSlider.value}`;
			object2SpeedDisplay.textContent = `Object 2 Speed: ${object2SpeedSlider.value}`;
		}
	</script>
</html>

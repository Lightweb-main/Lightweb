<!DOCTYPE html>
<html>
	<head>
		<script type="module" src="https://q5js.org/q5.js"></script>
		<script type="module" src="https://q5play.org/q5play.js"></script>
		<style>
			h1 {
				font-size: 80px; 
				text-align: center;
			}
		</style>
	</head>
		
	<body>
		<h1>Newton's First Law of Motion Simulation (Inertia)</h1>
		<h2 style="text-align: center;">This is a simulation showing what an object would look like if an object was moving without any external forces.<br>Move the slider to change friction to see how differently the object slides across the ground.</h2>
		<input type="range" min="0" max="100" value="0" id="object1FrictionSlider"></input>
	</body>
	<script>
		
		setInterval(generate, 900);
		let object;
		
		function generate(){
			object = new Sprite();
			object.y = 475;
			object.x = 0;
			object.vel.x = 10;
			object.friction = (object1FrictionSlider.value / 100);
			object.life = 500;
			
		}

		
		async function setup() {
			await Canvas(2000, 600);
			world.gravity.y = 10;

			
			let ground = new Sprite();
			ground.physics = STATIC;
			ground.width = width * 1.5;
			ground.height = 4;
			ground.color = "grey";
			ground.y = 500;
			


		}

		
	
		
		function draw(){
			background("#eeeeee");
			fill(0);
			textSize(30);
			text(`Friction: ${object1FrictionSlider.value}`, 50, 50);
		}
		
	</script>
</html>

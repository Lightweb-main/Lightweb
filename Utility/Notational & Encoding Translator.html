<!DOCTYPE html>
<head>
  <title>Lightweb: Notational & Encoding Translator</title>
  <link rel="stylesheet" href="../CSS/Lightweb.css">
  <style>
	textarea{
		width: 100vw;
		height: 30vh;
		font-size: 16px;
		font-family: "Lucida Console", serif;
		padding: 5px;
	}
  </style>
</head>
<body>
	<h1>Notational & Encoding Translator</h1>
	<h2>Input</h2>
	<select id="inputNum">
		<optgroup label="Positional Numerical Systems">
			<option value="binary">Binary</option>
			<option value="reverseBinary">Reverse Binary</option>
			<option value="decimal">Decimal</option>
			<option value="octal">Octal</option>
			<option value="hexadecimal">Hexadecimal</option>
			<option value="base30">Base 30</option>
			<option value="base36">Base 36</option>
		</optgroup>
		<optgroup label="Encoding Systems">
			<option value="A1Z26">A1Z26</option>
			<option value="base64">Base64</option>
			<option value="morseCode">Morse Code</option>
			<option value="UTF-8">UTF-8 Bytes</option>
		</optgroup>
		<optgroup label="Other Systems">
			<option value="text">Text (ASCLL)</option>
		</optgroup>
	</select>
	<h2>Output</h2>
	<select id="outputNum">
		<optgroup label="Positional Numerical Systems">
			<option value="binary">Binary</option>
			<option value="reverseBinary">Reverse Binary</option>
			<option value="decimal">Decimal</option>
			<option value="octal">Octal</option>
			<option value="hexadecimal">Hexadecimal</option>
			<option value="base30">Base 30</option>
			<option value="base36">Base 36</option>
		</optgroup>
		<optgroup label="Encoding Systems">
			<option value="A1Z26">A1Z26</option>
			<option value="base64">Base64</option>
			<option value="morseCode">Morse Code</option>
			<option value="UTF-8">UTF-8 Bytes</option>
		</optgroup>
		<optgroup label="Other Systems">
			<option value="text">Text (ASCLL)</option>
		</optgroup>
	</select>
	<h2>String Split</h2>
	<select id="splittingAmount">
		<option value="0">No Splitting</option>
		<option value="1">1 bit</option>
		<option value="2">2 bits</option>
		<option value="4">4 bits</option>
		<option value="8">8 bits</option>
		<option value="16">16 bits</option>
		<option value="32">32 bits</option>
		<option value="64">64 bits</option>
	</select><br><br>
	<button id="switchBtn">Switch</button><br>
	<h2>Input</h2>
	<textarea id="input"></textarea>
	<button style="font-size: 25px; width: 100vw;" id="translateBtn">Translate</button>
	<h2>Output</h2>
	<textarea id="output" readonly></textarea>
	<button style="font-size: 25px; width: 100vw;" id="downloadTxt">Download as .txt</button>
	<button style="font-size: 25px;"onClick="exit()">Exit</button>
	
	
	
	<script>
	function exit(){
	document.location = "../MainPages/Utility.html"
	}
	</script>
	<script src="../Important/DigitalClock.js"></script>
	<script src="Notational%20&%20Encoding Translator.js"></script>
</body>
</html>

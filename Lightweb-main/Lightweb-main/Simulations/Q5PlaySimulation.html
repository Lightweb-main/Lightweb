<!DOCTYPE html> 
<html>
	<head></head>
	<body>
  <h2>q5.play.js Simulation</h2>
  <div id="container">
    <iframe id="output"></iframe>

    <div id="editor">
	<button onclick="runCode()">Run Code</button>
      <textarea id="codeInput" spellcheck="false"  placeholder="Type your Q5.play.js code here..."></textarea>
	  <button onclick="exit()">Exit</button>
    </div>
  </div>

  <script>
const textarea = document.getElementById("codeInput");
	textarea.value = 
	`
	async function setup(){
		await Canvas(canvas.w, canvas.h);
		let ball = new Sprite();
		ball.diameter = 15;
		ball.color = red;
		ball.physics = DYNAMIC;
		
		let bat = new Sprite();
		bat.width = 135;
		bat.height = 15;
		bat.y = 800;
		bat.rotationSpeed = 10;
		bat.physics = KINEMATIC;
	}
		
	function draw(){
		world.gravity.y = 10;
		background("#eeeeee");
	}
	`;

  textarea.addEventListener("keydown", (event) => {
    if (event.key === '>') {
        const cursor = textarea.selectionStart;
        const value = textarea.value;

        const before = value.slice(0, cursor);
        const after = value.slice(cursor);

        const tagMatch = before.match(/<(\w+)>$/);

        if (tagMatch) {
          const tagName = tagMatch[1];
          const voidTags = ['br', 'hr', 'img', 'meta', 'input', 'link'];

          if (!voidTags.includes(tagName.toLowerCase())) {
            const closingTag = `</${tagName}>`;

            if (!after.startsWith(closingTag)) {
              textarea.value = before + closingTag + after;

              const newCursor = before.length;
              textarea.setSelectionRange(newCursor, newCursor);
            }
          }
        }
    }
  });
    function runCode() {
	  
      const userCode = document.getElementById("codeInput").value;
      const outputFrame = document.getElementById("output");
	  const oldFrame = document.getElementById("output");
	  const newFrame = oldFrame.cloneNode(true);
	  oldFrame.replaceWith(newFrame);
      const outputDoc = newFrame.contentDocument;
	  const html = 
	`
<!DOCTYPE html>
<html>
	<head>
		<script src="https://q5js.org/q5.js"><\/script>
		<script type="module" src="https://q5play.org/q5play.js"><\/script>
	</head>
	<body>
		
	</body>
	<script>
		${userCode};
	<\/script>
</html>
	
	`;
      outputDoc.open();
      outputDoc.write(html);
      outputDoc.close();
    }
	
	function exit(){
	document.location = "../MainPages/Simulations.html"
	}
  </script>
	<script src="../Important/DigitalClock.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <title>Lightweb: Coin Flipper</title>
	<link rel="stylesheet" href="Coin%20Flipper.css">
	<meta charset="UTF-8"/>
</head>

<body>
    <h1>Lightweb: Coin Flipper</h1>
	<h2>Inputs</h2>
	<input id="flipQuantityInput">
	<label for="flipQuantityInput">Amount of flips</label><br><br>
	<button id="flipBtn">Flip Coin</button>
	<h2>Outputs</h2>
	<p id="headDisplay">Heads: </p>
	<p id="tailsDisplay">Tails: </p>
	<br>
	<p id="headDistributionDisplay">Heads: </p>
	<p id="tailsDistributionDisplay">Tails: </p>
	
	
	<button id="exit" class="exitButton" onClick="exit()">Exit</button>
</body>
	
	<script src="../Important/DigitalClock.js"></script>
	<script src="Coin%20Flipper.js"></script>
</html>

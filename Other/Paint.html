 <!DOCTYPE html>
<html>

<head>
    <title>Lightweb: Paint</title>
	<link rel="stylesheet" href="Paint.css">
</head>

<body>

	<div id="container">
	
		<div id="settings">
			<div id="paintSettings">
				<h3 id="paintWidthDisplay">Paint Width: </h3>
				<input style="display: inline;" id="paintWidthSlider" type="range" min="1" max="100" value="1">
				<h3 id="paintScatterDisplay">Scatter: </h3>
				<input style="display: inline;" id="paintScatterSlider" type="range" min="0" max="500" value="0">
				<div style="display: inline;" id="paintWidthPreview"></div><br><br>
				<input type="color" id="paintColorInput">
			</div>
			<div id="canvasSettings">
				<h2>Canvas Settings</h2>
				<button id="changeCanvasBackground">Set Background Color</button>  <input type="color" id="canvasBackgroundColorInput"><br><br>
				<button onClick="generateEmptyCanvas()" id="removeCanvasBackground">Remove Background</button><br><br>
				<button onClick="deleteCanvas()" id="deleteCanvas">Delete</button><br><br>
			</div>
			<div id="downloading">
				<h2>Downloading</h2>
				<button onClick="downloadJPEG()" id="downloadJPEG">Download as JPEG</button><br><br>
				<button onClick="downloadPNG()" id="downloadPNG">Download as PNG</button><br><br>
			</div>
	
			<div id="buttons" style="margin-top: 25px;"> 
				<button id="nextPageBtn">Next Page</button><br><br>
				<button onClick="exit()">Exit</button>
			</div>
		</div>
		<canvas id="paintCanvas"></canvas>
	</div>
		<script>
			function exit(){ window.location = "../MainPages/Other.html"};
		</script>
		<script src="../Important/DigitalClock.js"></script>
		<script src="Paint.js"></script>
	</body>
</html>

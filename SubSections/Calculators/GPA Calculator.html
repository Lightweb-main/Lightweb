<!DOCTYPE html>
<head>
  <title>Lightweb: Calculator</title>
  <link rel="stylesheet" href="../CSS/Lightweb.css">
  <style>
	#container {
		padding: 15px;
		width: 100vw;
		height: auto;
		border: 3px solid var(--border);
	}
	
	.section {
		padding: 15px;
		border: 1px solid var(--border);
		margin: 30px;
	}
  </style>
</head>

<body>
	<br><br><br><br><br><br>
	<div id="container">
		<div id="courseSettings" class="section">
			<input id="amountOfCoursesInput"> Amount of Courses</input>
			<button id="courseSettingsBtn">Generate</button>
		</div>
		<div id="courseDisplay" class="section"></div>
		<button id="calculateBtn">Calculate</button>
		<div style="display: none;" id="results" class="section">
			<h2>Results</h2>
			<p id="gpaDisplay">GPA: </p>
			<button onClick="document.getElementById('results').style.display = 'none'">Clear</button>
		</div>
		<div id="gradingSystem" class="section">
			<div id="gradingSystemSelect">
				<h2>Grading System Selection</h2>
				<p id="gradingSystemSelectedDisplay">System Selected: </p>
				<button id="gradingSystemSet1Btn">System 1</button>
				<button id="gradingSystemSet2Btn">System 2</button>
				<table id="gradingSystem1Table">
					<tr>
						<td colspan="2">System 1</td>
					</tr>
					<tr>
						<td>Letter</td>
						<td>Grade Points</td>
					</tr>
					<tr>
						<td>A+</td>
						<td>4.3</td>
					</tr>
					<tr>
						<td>A</td>
						<td>4</td>
					</tr>
					<tr>
						<td>A-</td>
						<td>3.6</td>
					</tr>
					<tr>
						<td>B+</td>
						<td>3.3</td>
					</tr>
					<tr>
						<td>B</td>
						<td>3</td>
					</tr>
					<tr>
						<td>B-</td>
						<td>2.7</td>
					</tr>
					<tr>
						<td>C+</td>
						<td>2.3</td>
					</tr>
					<tr>
						<td>C</td>
						<td>2</td>
					</tr>
					<tr>
						<td>C-</td>
						<td>1.7</td>
					</tr>
					<tr>
						<td>D+</td>
						<td>1.3</td>
					</tr>
					<tr>
						<td>D</td>
						<td>1</td>
					</tr>
					<tr>
						<td>D-</td>
						<td>0.7</td>
					</tr>
					<tr>
						<td>F</td>
						<td>0</td>
					</tr>
				</table>
				<table id="gradingSystem2Table">
					<tr>
						<td colspan="2">System 2</td>
					</tr>
					<tr>
						<td>Letter</td>
						<td>Grade Points</td>
					</tr>
					<tr>
						<td>A+</td>
						<td>4</td>
					</tr>
					<tr>
						<td>A</td>
						<td>4</td>
					</tr>
					<tr>
						<td>A-</td>
						<td>4</td>
					</tr>
					<tr>
						<td>B+</td>
						<td>3</td>
					</tr>
					<tr>
						<td>B</td>
						<td>3</td>
					</tr>
					<tr>
						<td>B-</td>
						<td>3</td>
					</tr>
					<tr>
						<td>C+</td>
						<td>2</td>
					</tr>
					<tr>
						<td>C</td>
						<td>2</td>
					</tr>
					<tr>
						<td>C-</td>
						<td>2</td>
					</tr>
					<tr>
						<td>D+</td>
						<td>1</td>
					</tr>
					<tr>
						<td>D</td>
						<td>1</td>
					</tr>
					<tr>
						<td>D-</td>
						<td>1</td>
					</tr>
					<tr>
						<td>F</td>
						<td>0</td>
					</tr>
				</table>
			</div>
		</div>
		<button style="font-size: 25px;"onClick="exit()">Exit</button>
	</div>
	
	
	
	
	<script>
		function exit(){
			window.location = "../../SubMainPages/CalculatorPage.html"
		}
	</script>
	<script src="../../Important/DigitalClock.js"></script>
	<script src="GPA%20Calculator.js"></script>
</body>
</html>
